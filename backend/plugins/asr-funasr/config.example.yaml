# FunASR ASR — DashScope cloud mode
asr:
  enabled: true
  extension: asr-funasr:asr
  config:
    api_key: ${DASHSCOPE_API_KEY}
    model: fun-asr-realtime-2026-02-28
    sample_rate: 16000

