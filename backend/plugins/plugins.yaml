# Tank Plugin Configuration
#
# This file configures which plugins are enabled and their settings.
# Each top-level key is a "slot" (tts, asr, llm, etc.).
# Only one plugin can be active per slot.

#tts:
#  plugin: tts-edge           # Plugin folder name under plugins/
#  config:
#    voice_en: en-US-JennyNeural
#    voice_zh: zh-CN-XiaoxiaoNeural

# Alternative: CosyVoice TTS with auto-managed Docker container
 tts:
   plugin: tts-cosyvoice
   config:
     docker: true                       # auto-manage Docker container
     docker_image: tank-cosyvoice:latest
     docker_container: tank-cosyvoice
     port: 50000
     model_dir: iic/CosyVoice-300M-SFT
     mode: sft                          # "sft", "zero_shot", or "instruct2"
     spk_id_en: 英文女
     spk_id_zh: 中文女
     sample_rate: 22050
     timeout_s: 120
     # zero_shot mode only:
     # prompt_text: "Hello, this is a test."
     # prompt_wav_path: /path/to/prompt.wav

