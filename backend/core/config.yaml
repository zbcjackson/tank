tts:
  enabled: true
  extension: tts-edge:tts
  config:
    voice_en: en-US-JennyNeural
    voice_zh: zh-CN-XiaoxiaoNeural

speaker:
  enabled: true
  extension: speaker-sherpa:speaker_id
  config:
    model_path: ../models/speaker/3dspeaker_speech_eres2net_base_sv_zh-cn_3dspeaker_16k.onnx
    num_threads: 1
    provider: cpu
    db_path: ../data/speakers.db
    threshold: 0.6
    default_user: Unknown

sandbox:
  enabled: true
  backend: auto                          # auto | docker | seatbelt | bubblewrap

  # What the sandbox can physically see (Plane A enforcement)
  # Same-path mounts: host path == container path
  mounts:
    - host: "~"
      mode: ro
    - host: "~/.agent-browser"
      mode: rw

  # Never mountable — hardcoded, not overridable by user config.
  # Reading these files IS the security breach.
  # (Enforced in code via DENIED_MOUNTS_HARDCODED — listed here for reference)
  # denied_mounts_hardcoded:
  #   - ~/.ssh
  #   - ~/.gnupg
  #   - ~/Library/Keychains
  #   - /var/run/docker.sock

  # Configurable denied mounts — sensible defaults, user can modify
  denied_mounts:
    - ~/.aws
    - ~/.azure
    - ~/.config/gcloud

  # Resource limits
  memory_limit: 1g
  cpu_count: 2
  timeout: 120
  max_timeout: 600

  # Docker-specific
  docker:
    image: tank-sandbox:latest
    workspace_host_path: ./workspace

# File access policy — controls which files the agent can read/write/delete.
# Rules are evaluated top-down; first match wins.
# Levels: allow | require_approval | deny
file_access:
  default_read: allow
  default_write: require_approval
  default_delete: require_approval
  rules:
    - paths:
        - "~/.ssh/**"
        - "~/.gnupg/**"
        - "~/.aws/**"
        - "~/.config/gcloud/**"
        - "~/Library/Keychains/**"
        - "**/.env"
        - "**/.env.*"
        - "**/*.pem"
        - "**/*.key"
        - "**/id_rsa*"
        - "**/id_ed25519*"
        - "**/credentials*"
        - "**/*secret*"
      read: deny
      write: deny
      delete: deny
      reason: "Secrets and credentials"
    - paths:
        - "~/.bashrc"
        - "~/.zshrc"
        - "~/.profile"
        - "~/.bash_profile"
        - "~/.gitconfig"
        - "~/Library/**"
        - "/etc/**"
        - "/System/**"
        - "/usr/**"
        - "/bin/**"
        - "/sbin/**"
      read: allow
      write: require_approval
      delete: deny
      reason: "System configuration"
    - paths:
        - "/opt/**"
        - "/usr/local/**"
      read: allow
      write: require_approval
      delete: require_approval
      reason: "Package manager directory"
  backup:
    enabled: true
    path: ~/.tank/backups
    max_age_days: 30

# Network access policy — controls which hosts the agent can connect to.
# Levels: allow | require_approval | deny
network_access:
  default: allow
  rules:
    - hosts:
        - "pastebin.com"
        - "hastebin.com"
        - "0x0.st"
        - "transfer.sh"
        - "dpaste.org"
      policy: require_approval
      reason: "Content sharing service — could leak data"
    - hosts:
        - "*.onion"
        - "*.i2p"
      policy: deny
      reason: "Anonymous network"
  service_credentials:
    - name: serper
      env_var: SERPER_API_KEY
      allowed_hosts:
        - "google.serper.dev"

# Audit log — structured append-only log for file and network operations.
audit:
  enabled: true
  log_path: ~/.tank/audit.jsonl

# Assistant — pipeline-level settings
assistant:
  speech_interrupt_enabled: true

# Brain — conversation processing settings
brain:
  max_history_tokens: 131072

# Agent orchestration — main agent has all tools, delegates via `agent` tool.
# Agent definitions are loaded from .tank/agents/*.md files.
agents:
  llm_profile: default
  dirs:
    - ../agents              # project-level agent definitions
    - ~/.tank/agents         # user-level agent definitions
  max_depth: 3               # max sub-agent nesting depth
  max_concurrent: 5          # max parallel background agents

# Approval policies — optional config for tools that need user confirmation.
#
# Sandbox tools (run_command, persistent_shell) always require approval — hardcoded
# in ApprovalPolicy, no need to list them here.
#
# File tools (file_read, file_write, file_delete, file_list) handle their own
# approval via FileAccessPolicy with per-path granularity — no need to list here.
#
# This config is for future tools that don't implement their own policy.
# Tools not listed default to always_approve.
#
# approval_policies:
#   require_approval:
#     - some_future_dangerous_tool
#   require_approval_first_time:
#     - some_future_tool

# Tools — optional API keys for tool plugins
tools:
  serper_api_key: ${SERPER_API_KEY:-}

# Skills — reusable, composable capabilities that Tank can learn and execute.
# Each skill is a directory with a SKILL.md file (YAML frontmatter + markdown).
# Skills are registered as individual tools so the LLM knows when to use them.
skills:
  enabled: true
  dirs:
    - ~/.tank/skills         # user-installed skills (default install target)
    - ../skills              # built-in skills (shipped with repo)
  # Auto-approve skills at or below this risk level on startup.
  # "low" = prompt-only skills auto-approved (default)
  # "medium" = also auto-approve skills with scripts or network tools
  # "high" = auto-approve everything except critical (dangerous patterns)
  auto_approve_threshold: low
  # Skill catalog budget — controls how much of the system prompt is used for skills.
  # Effective budget = min(percent-based, max_chars).
  catalog_budget_percent: 2        # % of max_history_tokens (in chars, ~4 chars/token)
  catalog_budget_max_chars: 12000  # hard ceiling regardless of context size

# Context — session persistence and conversation history management.
# store_type: "file" (one JSON per session in store_path dir) or "sqlite" (single DB file).
context:
  store_type: file
  store_path: ~/.tank/sessions

# Memory — persistent cross-session memory using mem0.
# Extracts facts from conversations and recalls them for personalization.
# LLM credentials default to the "default" LLM profile when not set.
memory:
  enabled: true
  db_path: ../data/memory
  search_limit: 5
#  embedding_api_key: ${LLM_API_KEY}
#  embedding_model: text-embedding-embeddinggemma-300m
#  embedding_base_url: http://127.0.0.1:1234/v1
  # Optional: override LLM model for fact extraction (cheaper is fine)
  # llm_model: openai/gpt-4.1-nano
  # Optional: override embedding provider (defaults to LLM credentials)
  # embedding_model: text-embedding-3-small
  # embedding_api_key: ${OPENAI_API_KEY}
  # embedding_base_url: https://api.openai.com/v1

# Preferences — per-user learned preferences from conversations.
# Preferences are stored as markdown files in ~/.tank/users/{user}/preferences.md
# and injected into the system prompt per-turn (like memory).
preferences:
  enabled: true
  max_entries: 20
  auto_learn: true  # Automatically extract preferences from conversations
  # base_dir: ~/.tank  # optional override
# Observability — Langfuse LLM tracing (optional).
# Set LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_HOST in .env to enable.
# Run `docker compose up -d` from project root to start self-hosted Langfuse.
# observability:
#   langfuse:
#     host: http://localhost:3001

# MCP servers are configured per-user in ~/.tank/mcp_servers.yaml
# See mcp_servers.yaml.example for the format.