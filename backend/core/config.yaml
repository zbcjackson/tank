# Tank Core Configuration
#
# LLM profiles: named configurations for different LLM providers/models.
# Use ${VAR} syntax to reference environment variables (secrets stay in .env).
#
# Plugin slots: each slot can be enabled/disabled independently.
# Use "extension: plugin-name:ext-name" to reference a specific extension.
# Set "enabled: false" or remove the section entirely to disable a feature.

llm:
  default:
    api_key: ${LLM_API_KEY}
    model: openai/gpt-5.4-nano #qwen/qwen3-coder-next
    base_url: https://openrouter.ai/api/v1
#    model: google/gemma-4-31b
#    base_url: http://127.0.0.1:1234/v1
    temperature: 0.7
    max_tokens: 10000
    extra_headers:
      HTTP-Referer: "http://localhost:3000"
      X-Title: "Tank Voice Assistant"
    stream_options: true
    # extra_body:
    #   reasoning:
    #     effort: none

  # Optional: Use a cheaper/faster model for context summarization
  # summarization:
  #   api_key: ${LLM_API_KEY}
  #   model: openai/gpt-4o-mini
  #   base_url: https://openrouter.ai/api/v1
  #   temperature: 0.3
  #   max_tokens: 500
  #   extra_headers:
  #     HTTP-Referer: "http://localhost:3000"
  #     X-Title: "Tank Voice Assistant"
  #   stream_options: false

# Echo guard — backend-side defense against self-echo (assistant hearing itself).
# Layer 1: VAD threshold — during playback, raise VAD sensitivity threshold to filter echo.
# Layer 2: Self-echo text detection — safety net comparing ASR output against recent TTS text.
echo_guard:
  enabled: true
  vad_threshold_during_playback: 0.85 # higher = less sensitive during playback
  self_echo_detection:
    similarity_threshold: 0.6 # discard if >60% token overlap with recent TTS
    window_seconds: 10.0 # compare against last 10s of TTS text

asr:
  enabled: true
  extension: asr-funasr:asr
  config:
    api_key: ${DASHSCOPE_API_KEY}
    model: fun-asr-realtime-2026-02-28
    sample_rate: 16000

# asr:
