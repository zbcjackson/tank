tts:
  enabled: true
  extension: tts-elevenlabs:tts
  config:
    api_key: ${ELEVENLABS_API_KEY}
    voice_id: "ulmOxiH84jmsJurmeFBi" # Default voice (used for English)
    model_id: eleven_v3
    sample_rate: 24000
    stability: 0.5
    similarity_boost: 0.75
    # Expressive controls (optional; best with eleven_v3):
    # style: 0.5            # 0-1, higher = more stylistic/emotional variation
    # use_speaker_boost: true
    # speed: 1.0
    # For eleven_v3, put emotion audio tags inline in the text the LLM produces,
    # e.g. "[whispers] hello [laughs]". No API parameter needed.
    # Language → voice map (add more languages as needed)
    voices:
      en: "ulmOxiH84jmsJurmeFBi"
      zh: "9DMBSOAnMDPiFAsz1ZGK" # Replace with a Chinese voice ID
    default_voice: "ulmOxiH84jmsJurmeFBi"
    # Legacy format still supported: voice_id / voice_id_zh


speaker:
  enabled: true
  extension: speaker-sherpa:speaker_id
  config:
    model_path: ../models/speaker/3dspeaker_speech_eres2net_base_sv_zh-cn_3dspeaker_16k.onnx
    num_threads: 1
    provider: cpu
    threshold: 0.6
    default_user: Unknown

sandbox:
  enabled: true
  backend: auto # auto | docker | seatbelt | bubblewrap

  # What the sandbox can physically see (Plane A enforcement)
  # Same-path mounts: host path == container path
  mounts:
    - host: "~"
      mode: ro
    - host: "~/.agent-browser"
      mode: rw

  # Never mountable — hardcoded, not overridable by user config.
  # Reading these files IS the security breach.
  # (Enforced in code via DENIED_MOUNTS_HARDCODED — listed here for reference)
  # denied_mounts_hardcoded:
  #   - ~/.ssh
  #   - ~/.gnupg
  #   - ~/Library/Keychains
  #   - /var/run/docker.sock

  # Configurable denied mounts — sensible defaults, user can modify
  denied_mounts:
    - ~/.aws
    - ~/.azure
    - ~/.config/gcloud

  # Resource limits
  memory_limit: 1g
  cpu_count: 2
  timeout: 120
  max_timeout: 600

  # Docker-specific
  docker:
    image: tank-sandbox:latest
    workspace_host_path: ./workspace

# File access policy — controls which files the agent can read/write/delete.
# Rules are evaluated top-down; first match wins.
# Levels: allow | require_approval | deny
file_access:
  default_read: allow
  default_write: require_approval
  default_delete: require_approval
  rules:
    - paths:
        - "~/.ssh/**"
        - "~/.gnupg/**"
        - "~/.aws/**"
        - "~/.config/gcloud/**"
        - "~/Library/Keychains/**"
        - "**/.env"
        - "**/.env.*"
        - "**/*.pem"
        - "**/*.key"
        - "**/id_rsa*"
        - "**/id_ed25519*"
        - "**/credentials*"
        - "**/*secret*"
      read: deny
      write: deny
      delete: deny
      reason: "Secrets and credentials"
    - paths:
        - "~/.bashrc"
        - "~/.zshrc"
        - "~/.profile"
        - "~/.bash_profile"
        - "~/.gitconfig"
        - "~/Library/**"
        - "/etc/**"
        - "/System/**"
        - "/usr/**"
        - "/bin/**"
        - "/sbin/**"
      read: allow
      write: require_approval
      delete: deny
      reason: "System configuration"
    - paths:
        - "/opt/**"
        - "/usr/local/**"
      read: allow
      write: require_approval
      delete: require_approval
      reason: "Package manager directory"
  backup:
    enabled: true
    path: ~/.tank/backups
    max_age_days: 30

# Network access policy — controls which hosts the agent can connect to.
# Levels: allow | require_approval | deny
network_access:
  default: allow
  rules:
    - hosts:
        - "pastebin.com"
        - "hastebin.com"
        - "0x0.st"
        - "transfer.sh"
        - "dpaste.org"
      policy: require_approval
      reason: "Content sharing service — could leak data"
    - hosts:
        - "*.onion"
        - "*.i2p"
      policy: deny
      reason: "Anonymous network"
  service_credentials:
    - name: serper
      env_var: SERPER_API_KEY
      allowed_hosts:
        - "google.serper.dev"

# Audit log — structured append-only log for file and network operations.
audit:
  enabled: true
  log_path: ~/.tank/audit.jsonl

# Assistant — pipeline-level settings
assistant:
  speech_interrupt_enabled: true
  # Fallback language when response/transcript detection is low-confidence.
  preferred_language: zh
  # Candidate languages for detection (ISO 639-1). Must have matching TTS voices.
  languages: [zh, en]

# Brain — conversation processing settings
brain:
  max_history_tokens: 131072

# Agent orchestration — main agent has all tools, delegates via `agent` tool.
# Agent definitions are loaded from .tank/agents/*.md files.
agents:
  llm_profile: default
  dirs:
    - ../agents # project-level agent definitions
    - ~/.tank/agents # user-level agent definitions
  max_depth: 3 # max sub-agent nesting depth
  max_concurrent: 5 # max parallel background agents

# Command security — per-command evaluation for shell tools (run_command, persistent_shell).
command_security:
  #   extra_safe_commands:       # merged with built-in safe list
  #     - "docker"
  #     - "kubectl"
  #   extra_dangerous_patterns:  # merged with built-in dangerous patterns
  #     - pattern: '\bdocker\s+rm\b'
  #       description: "docker container removal"
  #   always_require_approval:   # overrides safe list
  #     - "sudo"
  llm_evaluation: # optional LLM for unknown commands
    enabled: true
#     model: "gpt-4o-mini"
#     provider: "openai"       # "openai" | "anthropic" | any OpenAI-compatible
#     api_key: ""              # empty = use main LLM api_key
#     base_url: ""             # empty = use provider default
#     timeout: 3               # seconds, fail-safe to require_approval

# Tool guardrails — loop detection for repeated tool failures.
# Prevents the LLM from retrying failing tools indefinitely.
# Thresholds control when warnings are injected and when tools are blocked.
tool_guardrails:
  enabled: true
#   exact_repeat_warn_after: 2   # same tool + same args fails N times → warn
#   exact_repeat_block_after: 4  # same tool + same args fails N times → block
#   same_tool_fail_warn_after: 3 # same tool (any args) fails N times → warn
#   same_tool_fail_block_after: 6
#   no_progress_warn_after: 3    # idempotent tool returns identical results → warn
#   no_progress_block_after: 5

# Toolset profiles — named tool subsets for agent/job scoping.
# Agents reference a profile by name via `toolset: <name>` in their definition.
# Empty tools list = all tools (no filtering).
toolsets:
  profiles:
    computer_use:
      description: "Desktop automation tools"
      tools: [screenshot, click, type_text, key_press, scroll, mouse_move, launch_app]
#     safe:
#       description: "Read-only tools"
#       tools: [file_read, file_list, file_search, web_search, calculate, get_time]
#     research:
#       description: "Web and file research"
#       tools: [file_read, file_list, file_search, web_search, web_fetch, calculate]
#     full:
#       description: "All tools (default)"
#       tools: []

# Hooks — user-defined shell scripts that fire on tool lifecycle events.
# pre_tool_call can block execution; post_tool_call is fire-and-forget.
# pre_llm_call can inject context into the system prompt.
# Scripts receive JSON on stdin; see docs/agentic-harness-features.md for protocol.
# hooks:
#   hooks:
#     - event: pre_tool_call
#       command: ~/.tank/hooks/audit.sh
#       matcher: "run_command|persistent_shell"  # regex on tool name (empty = all)
#       timeout: 3.0
#     - event: post_tool_call
#       command: ~/.tank/hooks/log-tools.sh
#     - event: pre_llm_call
#       command: ~/.tank/hooks/inject-context.sh

# Tools — optional API keys for tool plugins
tools:
  serper_api_key: ${SERPER_API_KEY:-}

# Skills — reusable, composable capabilities that Tank can learn and execute.
# Each skill is a directory with a SKILL.md file (YAML frontmatter + markdown).
# Skills are registered as individual tools so the LLM knows when to use them.
skills:
  enabled: true
  dirs:
    - ~/.tank/skills # user-installed skills (default install target)
    - ../skills # built-in skills (shipped with repo)
  # Auto-approve skills at or below this risk level on startup.
  # "low" = prompt-only skills auto-approved (default)
  # "medium" = also auto-approve skills with scripts or network tools
  # "high" = auto-approve everything except critical (dangerous patterns)
  auto_approve_threshold: low
  # Skill catalog budget — controls how much of the system prompt is used for skills.
  # Effective budget = min(percent-based, max_chars).
  catalog_budget_percent: 2 # % of max_history_tokens (in chars, ~4 chars/token)
  catalog_budget_max_chars: 12000 # hard ceiling regardless of context size

# Persistence — unified ORM-backed database for conversations, channels,
# jobs, and speakers. SQLite by default; swap to Postgres by changing ``url``.
# Alembic runs on startup and brings the schema to head idempotently.
# Legacy per-module ``*.db`` files are lifted-and-shifted into this DB on
# first boot, then renamed to ``*.bak``.
database:
  url: sqlite+pysqlite:///~/.tank/tank.db
  echo: false

# Context — conversation history compaction (messages persist to the unified DB above).
context:
  persist: true

# Memory — persistent cross-session memory using mem0.
# Extracts facts from conversations and recalls them for personalization.
# LLM credentials default to the "default" LLM profile when not set.
memory:
  enabled: true
  db_path: ../data/memory
  search_limit: 5
#  embedding_api_key: ${LLM_API_KEY}
#  embedding_model: text-embedding-embeddinggemma-300m
#  embedding_base_url: http://127.0.0.1:1234/v1
# Optional: override LLM model for fact extraction (cheaper is fine)
# llm_model: openai/gpt-4.1-nano
# Optional: override embedding provider (defaults to LLM credentials)
# embedding_model: text-embedding-3-small
# embedding_api_key: ${OPENAI_API_KEY}
# embedding_base_url: https://api.openai.com/v1

# Preferences — per-user learned preferences from conversations.
# Preferences are stored as markdown files in ~/.tank/users/{user}/preferences.md
# and injected into the system prompt per-turn (like memory).
preferences:
  enabled: true
  max_entries: 20
  auto_learn: true # Automatically extract preferences from conversations
  # base_dir: ~/.tank  # optional override

# Dream Consolidation (IMP-1) — idle/scheduled curator that promotes
# durable facts to ``pinned``, merges duplicates, archives stale entries,
# and writes a per-user ``DREAMS.md`` diary alongside ``preferences.md``
# under ``~/.tank/users/<user>/`` for human inspection.
consolidation:
  enabled: true            # opt-in; off by default
  min_idle_minutes: 30     # require at least this long since last user activity
  interval_hours: 24       # at most one run per user per N hours
  diary_filename: DREAMS.md   # per-user, next to preferences.md
  llm_profile: consolidation  # falls back to ``default`` if missing
  top_k_candidates: 20
  schedule: "0 3 * * *"    # 03:00 daily
  # weights: defaults are fine; override individually if needed.
  # weights:
  #   frequency: 0.24
  #   relevance: 0.30
  #   diversity: 0.15
  #   recency: 0.15
  #   consolidation: 0.10
  #   conceptual: 0.06
# Observability — Langfuse LLM tracing (optional).
# Set LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_HOST in .env to enable.
# Run `docker compose up -d` from project root to start self-hosted Langfuse.
# observability:
#   langfuse:
#     host: http://localhost:3001

# MCP servers are configured per-user in ~/.tank/mcp_servers.yaml
# See mcp_servers.yaml.example for the format.

# Autonomous job scheduler — runs tasks on a cron schedule without user interaction.
# Job definitions live in the unified Tank database (see ``database:`` above),
# managed via voice, REST API, or an optional seed file at ~/.tank/jobs/seed.yaml.
jobs:
  enabled: true
  max_parallel: 3 # Max concurrent job executions
  tick_interval: 60 # Seconds between scheduler ticks
#   output_dir: ~/.tank/jobs/output
#   seed_path: ~/.tank/jobs/seed.yaml

