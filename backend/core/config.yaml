# Tank Core Configuration
#
# LLM profiles: named configurations for different LLM providers/models.
# Use ${VAR} syntax to reference environment variables (secrets stay in .env).
#
# Plugin slots: each slot can be enabled/disabled independently.
# Use "extension: plugin-name:ext-name" to reference a specific extension.
# Set "enabled: false" or remove the section entirely to disable a feature.

llm:
  default:
    api_key: ${LLM_API_KEY}
    model: openai/gpt-5-nano
    base_url: https://openrouter.ai/api/v1
    temperature: 0.7
    max_tokens: 10000
    extra_headers:
      HTTP-Referer: "http://localhost:3000"
      X-Title: "Tank Voice Assistant"
    stream_options: true

asr:
  enabled: true
  extension: asr-sherpa:asr
  config:
    model_dir: ../models/sherpa-onnx-zipformer-en-zh
    num_threads: 4
    sample_rate: 16000

tts:
  enabled: true
  extension: tts-edge:tts
  config:
    voice_en: en-US-JennyNeural
    voice_zh: zh-CN-XiaoxiaoNeural

speaker:
  enabled: true
  extension: speaker-sherpa:speaker_id
  config:
    model_path: ../models/speaker/3dspeaker_speech_eres2net_base_sv_zh-cn_3dspeaker_16k.onnx
    num_threads: 1
    provider: cpu
    db_path: ../data/speakers.db
    threshold: 0.6
    default_user: Unknown


sandbox:
  enabled: true
  image: tank-sandbox:latest
  workspace_host_path: ./workspace
  memory_limit: 1g
  cpu_count: 2
  default_timeout: 120
  max_timeout: 600
  network_enabled: true
