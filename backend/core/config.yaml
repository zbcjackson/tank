# Tank Core Configuration
#
# LLM profiles: named configurations for different LLM providers/models.
# Use ${VAR} syntax to reference environment variables (secrets stay in .env).
#
# Plugin slots: each slot can be enabled/disabled independently.
# Use "extension: plugin-name:ext-name" to reference a specific extension.
# Set "enabled: false" or remove the section entirely to disable a feature.

llm:
  default:
    api_key: ${LLM_API_KEY}
    model: openai/gpt-oss-120b
    base_url: https://openrouter.ai/api/v1
    temperature: 0.7
    max_tokens: 10000
    extra_headers:
      HTTP-Referer: "http://localhost:3000"
      X-Title: "Tank Voice Assistant"
    stream_options: true
    # extra_body:
    #   reasoning:
    #     effort: none

  # Optional: Use a cheaper/faster model for context summarization
  # summarization:
  #   api_key: ${LLM_API_KEY}
  #   model: openai/gpt-4o-mini
  #   base_url: https://openrouter.ai/api/v1
  #   temperature: 0.3
  #   max_tokens: 500
  #   extra_headers:
  #     HTTP-Referer: "http://localhost:3000"
  #     X-Title: "Tank Voice Assistant"
  #   stream_options: false

# Echo guard — backend-side defense against self-echo (assistant hearing itself).
# Layer 1: VAD threshold — during playback, raise VAD sensitivity threshold to filter echo.
# Layer 2: Self-echo text detection — safety net comparing ASR output against recent TTS text.
echo_guard:
  enabled: true
  vad_threshold_during_playback: 0.85 # higher = less sensitive during playback
  self_echo_detection:
    similarity_threshold: 0.6 # discard if >60% token overlap with recent TTS
    window_seconds: 10.0 # compare against last 10s of TTS text

asr:
  enabled: true
  extension: asr-sherpa:asr
  config:
    model_dir: ../models/sherpa-onnx-zipformer-en-zh
    num_threads: 4
    sample_rate: 16000

tts:
  enabled: true
  extension: tts-edge:tts
  config:
    voice_en: en-US-JennyNeural
    voice_zh: zh-CN-XiaoxiaoNeural

speaker:
  enabled: true
  extension: speaker-sherpa:speaker_id
  config:
    model_path: ../models/speaker/3dspeaker_speech_eres2net_base_sv_zh-cn_3dspeaker_16k.onnx
    num_threads: 1
    provider: cpu
    db_path: ../data/speakers.db
    threshold: 0.6
    default_user: Unknown

sandbox:
  enabled: true
  image: tank-sandbox:latest
  workspace_host_path: ./workspace
  memory_limit: 1g
  cpu_count: 2
  default_timeout: 120
  max_timeout: 600
  network_enabled: true

# Assistant — pipeline-level settings
assistant:
  speech_interrupt_enabled: true

# Brain — conversation processing settings
brain:
  max_history_tokens: 8000

# Agent orchestration — route user messages to specialized agents.
# Remove this section entirely to use the default direct-LLM path.
agents:
  chat:
    type: chat
    llm_profile: default
    # tools: all (no filter — chat agent gets every registered tool)
  search:
    type: search
    llm_profile: default
    tools: [web_search, web_scraper]
  task:
    type: task
    llm_profile: default
    tools: [calculate, get_time, get_weather]
  code:
    type: code
    llm_profile: default
    tools: [sandbox_exec, sandbox_bash, sandbox_process]

# Router — classifies user intent and dispatches to the right agent.
# Fast-path: regex keyword match (zero latency).
# Slow-path: LLM classification (requires llm_profile, optional).
router:
  llm_profile: default   # uncomment to enable LLM-based slow-path classification
  default: chat
  routes:
    search:
      agent: search
      keywords: [search, look up, find, google, 搜索, 查找, 查一下]
      description: Web search and information retrieval
    code:
      agent: code
      keywords: [run code, execute, python, script, 运行代码, 执行]
      description: Code execution in sandbox
    task:
      agent: task
      keywords: [calculate, compute, what time, 计算, 几点, 天气]
      description: Calculations, time queries, and weather

# Tools — optional API keys for tool plugins
tools:
  serper_api_key: ${SERPER_API_KEY:-}

# Conversation persistence — save/restore conversation history across restarts.
# Disabled by default. Enable and set db_path to activate.
persistence:
  enabled: false
  db_path: ../data/sessions.db

# Observability — Langfuse LLM tracing (optional).
# Set LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_HOST in .env to enable.
# Run `docker compose up -d` from project root to start self-hosted Langfuse.
# observability:
#   langfuse:
#     host: http://localhost:3001
