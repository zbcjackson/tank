# Generic single-database Alembic configuration for Tank.
#
# The URL is **not** set here — it's injected at runtime from
# ``AppConfig.database.url`` inside ``env.py``. Do not hardcode it.

[alembic]
# Path to migration scripts, relative to this file's directory.
script_location = %(here)s

# Template used to generate migration file names; see
# https://alembic.sqlalchemy.org/en/latest/tutorial.html#editing-the-ini-file
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# timezone for migration file timestamps (UTC)
timezone = UTC

# sys.path addition — keeps ``env.py`` able to ``import tank_backend`` when
# invoked from the ``core`` directory.
prepend_sys_path = ../../../..
path_separator = os

# Using ``sqlalchemy.url`` would override the runtime value; we intentionally
# leave it blank so ``env.py`` always consults ``AppConfig``.
sqlalchemy.url =


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
