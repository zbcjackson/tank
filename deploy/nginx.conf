# nginx configuration for Tank Voice Assistant (single-origin gateway)
#
# This config serves the React SPA and proxies /api and /ws to the backend
# on the same origin. All traffic goes through nginx; only nginx speaks to
# the backend (which can bind to localhost for security).
#
# Place your SSL certificates at /etc/ssl/tank/fullchain.pem and
# /etc/ssl/tank/privkey.pem, or update the paths below.
#
# For Let's Encrypt with certbot:
#   certbot certonly --webroot -w /var/www/html -d tank.example.com
#   ln -s /etc/letsencrypt/live/tank.example.com/fullchain.pem /etc/ssl/tank/
#   ln -s /etc/letsencrypt/live/tank.example.com/privkey.pem /etc/ssl/tank/
#
# Then include this file from your main nginx.conf:
#   include /path/to/deploy/nginx.conf;

server {
  listen 443 ssl http2;
  server_name _;  # Replace with your domain (e.g., tank.example.com)

  ssl_certificate     /etc/ssl/tank/fullchain.pem;
  ssl_certificate_key /etc/ssl/tank/privkey.pem;

  # TLS hardening (adjust to your security requirements)
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
  ssl_prefer_server_ciphers off;

  # File uploads via /api/upload can be up to 50MB
  client_max_body_size 50m;

  # SPA static files (copy web/dist/* to /srv/tank/web/)
  root /srv/tank/web;
  location / {
    try_files $uri /index.html;
  }
  # No caching for index.html (reference version)
  location = /index.html {
    add_header Cache-Control "no-cache";
  }
  # Immutable cache for hashed assets
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # REST API proxy
  location /api/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Disable request buffering for streaming uploads
    proxy_request_buffering off;
  }

  # WebSocket proxy (audio streaming)
  location /ws/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host       $host;
    # Keep WS connections alive for long-running voice sessions
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
    # Critical for streaming PCM / token frames: disable buffering
    proxy_buffering off;
  }
}

# Optional: redirect HTTP to HTTPS
# server {
#   listen 80;
#   server_name tank.example.com;
#   return 301 https://$host$request_uri;
# }
