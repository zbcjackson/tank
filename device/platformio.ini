[platformio]
default_envs = cores3
src_dir = main
extra_configs = platformio_local.ini

[env]
platform = espressif32@6.9.0
framework = espidf
monitor_speed = 115200
extra_scripts = pre:inject_env.py
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3

[env:cores3]
board = esp32-s3-devkitc-1
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.psram_type = quad
board_build.partitions = partitions_16MB.csv
build_flags =
    ${env.build_flags}
    -DTARGET_CORES3

[env:pyramid]
board = esp32-s3-devkitc-1
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_build.psram_type = quad
board_build.partitions = partitions_8MB.csv
build_flags =
    ${env.build_flags}
    -DTARGET_PYRAMID

[env:native]
platform = native
framework =
extra_scripts =
test_framework = googletest
build_flags =
    -std=c++17
    -DNATIVE_TEST
    -DCONFIG_BACKEND_PORT=8000
    -DCONFIG_BACKEND_HOST=\"localhost\"
    -DCONFIG_WIFI_SSID=\"test_ssid\"
    -DCONFIG_WIFI_PASSWORD=\"test_pass\"
    -DCONFIG_PUSH_TO_TALK=1
    -DCONFIG_WAKE_WORD=0
    -DCONFIG_SPK_SAMPLE_RATE=16000
    -DCONFIG_MIC_SAMPLE_RATE=16000
    -DCONFIG_TANK_WS_BUFFER_SIZE=8192
    -DCONFIG_NET_TASK_STACK=8192
    -DCONFIG_NET_TASK_PRIORITY=18
    -DCONFIG_WS_NETWORK_TIMEOUT_MS=30000
    -DCONFIG_WS_PINGPONG_TIMEOUT_S=30
    -DCONFIG_WS_RECONNECT_MS=3000
    -DAUDIO_FRAME_MAGIC=0x544B
    -DAUDIO_FRAME_HEADER_SIZE=8
    -I main
    -I main/app
    -I main/net
    -I main/audio
    -I main/hal
    -I main/ui
    -I main/ui/screens
    -I main/settings
    -I test/test_native/compat
    -I test/test_native/stubs
    -I test/test_native/mocks
test_filter = test_native/*
lib_extra_dirs =
    test/test_native/libs
lib_deps =
    cJSON
build_src_filter =
    -<*>

[env:cores3_test]
extends = env:cores3
test_framework = unity
test_filter = test_device/test_all
test_build_src = true
build_flags =
    ${env:cores3.build_flags}
    -DDEVICE_TEST
